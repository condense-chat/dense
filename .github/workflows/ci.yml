name: ci

# workflow_dispatch lets cut-release trigger checks on its release branch —
# PRs created with GITHUB_TOKEN don't fire pull_request workflows, and the
# branch-protection required checks must still report on the head SHA.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Every PR commit lands verbatim on main (rebase-only merges), and
  # git-cliff silently drops unconventional messages from the changelog —
  # so each commit must parse, not just the PR title.
  commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Conventional Commits
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|perf|test|ci)(\([a-z0-9_./-]+\))?!?: .+'
          bad=0
          while IFS= read -r line; do
            sha="${line%% *}"; subject="${line#* }"
            if ! grep -qE "$pattern" <<<"$subject"; then
              echo "::error::not a conventional commit: ${sha:0:8} \"${subject}\""
              bad=1
            fi
          done < <(git log --no-merges --format="%H %s" "${BASE}..${HEAD}")
          if [ "$bad" = 0 ]; then echo "all commits conventional"; fi
          exit "$bad"

  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

  dist:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y musl-tools file
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Build static musl binary
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --locked --release --target x86_64-unknown-linux-musl
      - name: Smoke
        run: |
          BIN="target/x86_64-unknown-linux-musl/release/dense"
          file "$BIN" | grep -qE "statically linked|static-pie linked" || { echo "not statically linked"; exit 1; }
          "$BIN" --version
          "$BIN" --help
      - uses: actions/upload-artifact@v4
        with:
          name: dense-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/dense
          if-no-files-found: error
          # smoke byproduct, not a deliverable — releases build their own
          retention-days: 3
