name: release

# Runs on a vX.Y.Z tag — pushed directly, or dispatched against the tag by
# cut-release.yml (a GITHUB_TOKEN tag push doesn't cascade into a tag event).
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require a release tag ref
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "release must run on a vX.Y.Z tag ref, got ${{ github.ref }}"
          exit 1

  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x86_64, runner: ubuntu-latest, target: x86_64-unknown-linux-musl, ext: "", smoke: true }
          - { platform: linux-aarch64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-musl, ext: "", smoke: true }
          - { platform: macos-aarch64, runner: macos-latest, target: aarch64-apple-darwin, ext: "", smoke: true }
          # cross-built on the arm runner; Rosetta availability isn't guaranteed
          - { platform: macos-x86_64, runner: macos-latest, target: x86_64-apple-darwin, ext: "", smoke: false }
          - { platform: windows-x86_64, runner: windows-latest, target: x86_64-pc-windows-msvc, ext: ".exe", smoke: true }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Linux build deps
        if: startsWith(matrix.platform, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools file
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          src="target/${{ matrix.target }}/release/dense${{ matrix.ext }}"
          if [[ "${{ matrix.platform }}" == linux-* ]]; then
            file "$src" | grep -qE "statically linked|static-pie linked" || { echo "not statically linked"; exit 1; }
          fi
          if [ "${{ matrix.smoke }}" = "true" ]; then
            "$src" --version
          fi
          mkdir -p dist
          asset="dense-${{ matrix.platform }}${{ matrix.ext }}"
          cp "$src" "dist/${asset}"
          # sha256sum: linux + windows git-bash; shasum: macos
          if command -v sha256sum >/dev/null; then
            sha="$(sha256sum "dist/${asset}" | cut -d' ' -f1)"
          else
            sha="$(shasum -a 256 "dist/${asset}" | cut -d' ' -f1)"
          fi
          printf '{"version":"%s","sha256":"%s"}\n' "$version" "$sha" \
            > "dist/manifest-${{ matrix.platform }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: dense-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Release notes
        uses: orhun/git-cliff-action@v4
        id: notes
        with:
          args: --latest --strip header
        env:
          OUTPUT: NOTES.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.changelog }}
          files: dist/*
          fail_on_unmatched_files: true
