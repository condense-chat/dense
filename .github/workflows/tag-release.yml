name: tag-release

# When a release PR lands on main, tag the merged commit as vX.Y.Z. The tag
# is pushed with the releaser app token, so the tag event triggers the
# release build naturally (a GITHUB_TOKEN push wouldn't cascade). Detection
# works for squash/rebase ("chore(release): vX.Y.Z") and merge-commit
# ("... from .../release/vX.Y.Z") messages, and the version is cross-checked
# against Cargo.toml so an unrelated commit mentioning a version can't cut
# a release.
on:
  push:
    branches: [main]

permissions: {}

concurrency: tag-release

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app
        with:
          app-id: ${{ vars.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_KEY }}
      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app.outputs.token }}
      - name: Tag the release merge
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          APP_SLUG: ${{ steps.app.outputs.app-slug }}
        run: |
          ver_msg="$(grep -oE '(chore\(release\): v|release/v)[0-9]+\.[0-9]+\.[0-9]+' <<<"$HEAD_MSG" \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
          ver_toml="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ -z "$ver_msg" ] || [ "$ver_msg" != "$ver_toml" ]; then
            echo "not a release merge (msg: ${ver_msg:-none}, Cargo.toml: ${ver_toml}) — nothing to do"
            exit 0
          fi
          tag="v${ver_toml}"
          if git ls-remote --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists — nothing to do"
            exit 0
          fi
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          echo "tagged ${tag}; the tag event runs the release build" >> "$GITHUB_STEP_SUMMARY"
